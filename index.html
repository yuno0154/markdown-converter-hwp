<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD2HWPX - 프리미엄 마크다운 변환기</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <main class="container">
        <header>
            <h1 class="glow-text">MD2HWPX</h1>
            <p class="subtitle">마크다운을 최신 한글(HWPX) 문서로 변환하세요</p>
        </header>

        <section class="editor-section">
            <form action="/convert" method="POST" enctype="multipart/form-data" class="converter-box">
                <div class="editor-header">
                    <span>Markdown Input</span>
                    <label class="btn-upload" title=".md 파일 업로드">
                        📂 파일 열기
                        <input type="file" id="md-file-input" name="md_file" accept=".md,.txt,.markdown" style="display:none">
                    </label>
                    <button type="submit" class="btn-convert">변환 및 다운로드</button>
                </div>
                <textarea name="markdown" id="md-input" placeholder="여기에 마크다운 내용을 입력하세요... (예: # 제목 \n 본문 내용)"></textarea>
            </form>
        </section>

        <footer>
            <p>© 2026 Antigravity MD2HWPX Project. All rights reserved.</p>
        </footer>
    </main>

    <script>
        // MD 파일 선택 시 textarea에 내용 로드
        document.getElementById('md-file-input').addEventListener('change', function () {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                document.getElementById('md-input').value = e.target.result;
            };
            reader.readAsText(file, 'UTF-8');
        });
    </script>
</body>
</html>
